name: Build on version tag

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_APP_VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
